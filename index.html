<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAT Study Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div>
            <h1>SAT Study Space</h1>
            <nav>
                <a href="#">Home</a>
                <a href="#">Vocabulary</a>
                <a href="#">Practice</a>
            </nav>
        </div>
        <button class="theme-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>
    </header>

    <main>
        <h2>Vocabulary Mastery Progress</h2>
        
        <div class="stats-card">
            <div class="stats-info">
                <span id="progressText">0 / 0 Words Mastered</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progressBarFill" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="controls-container">
            <select id="weekFilter" onchange="renderWords()">
                <option value="all">All Weeks</option>
                <option value="1">Week 1</option>
                <option value="2">Week 2</option>
            </select>

            <input type="text" id="searchInput" onkeyup="renderWords()" placeholder="Search word or definition...">
            
            <button class="action-btn" onclick="shuffleWords()">🔀 Shuffle</button>
        </div>

        <div id="wordGrid" class="word-grid"></div>
    </main>

    <footer>
        <p>Built by Ömer Kısacık - Started July 2026</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
